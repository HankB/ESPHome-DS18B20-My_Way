substitutions:
  hostname: esp32-b9ace8
  DS18B20_addr: "0xf300000056d06828"
  sensor_name: lab_temp

esphome:
  name: ${hostname}

esp32:
  variant: ESP32
  framework:
    type: esp-idf

# Enable logging
logger:

mqtt:
  broker: !secret mqtt_broker
  discovery: false
  log_topic:
    topic: debug
    level: ERROR
  client_id: ${hostname}
  topic_prefix: HA

# Example configuration entry
time:
  - platform: sntp
    id: sntp_time
    timezone: !secret timezone
    servers:
     - 0.pool.ntp.org
     - 1.pool.ntp.org
     - 2.pool.ntp.org

# Dallas DS18B20 sensor
one_wire:
  - platform: gpio
    pin: GPIO4

sensor:
  - platform: dallas_temp
    address: ${DS18B20_addr}  # replace after discovery from logs
    name: "${sensor_name}"
    id: temp
    update_interval: 60s
    on_value:
      then:
        - mqtt.publish_json:
            topic: HA/${hostname}/lab/${sensor_name}
            payload: |-
              root["t"] = id(sntp_time).now().timestamp;
              root["temp"] = x * 9.0 / 5.0 + 32.0;
              root["device"] = "DS18B20";
              root["DS18B20_ID"] = "${DS18B20_addr}";


ota:
  - platform: esphome

# https://community.home-assistant.io/t/blink-how/307243/14
# Blink the blue LED
output:
  - platform: gpio
    pin:
      number: 2
      mode: output
    id: blueLED

interval:
  - interval: 1000ms
    then:
      - output.turn_on: blueLED
      - delay: 50ms
      - output.turn_off: blueLED

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: !secret fallback_ssid
    password: !secret fallback_password

captive_portal:
    